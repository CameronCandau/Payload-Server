name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate release tag matches project version
        if: github.event_name == 'push'
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib
          import os

          ref = os.environ["GITHUB_REF_NAME"]
          match = re.fullmatch(r"v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)", ref)
          if not match:
              raise SystemExit(f"Release tags must match v<semver>; got {ref!r}")

          tag_version = match.group(1)
          pyproject = pathlib.Path("pyproject.toml")
          project_version = tomllib.loads(pyproject.read_text())["project"]["version"]
          if tag_version != project_version:
              raise SystemExit(
                  f"Tag version {tag_version!r} does not match pyproject.toml version {project_version!r}"
              )

          print(f"Validated release tag {ref} against pyproject.toml version {project_version}")
          PY
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Test
        run: |
          python -m unittest discover -s tests -v
          python -m compileall src tests
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
